name: Test

on:
  push:
    branches: [develop, main, linux]
  pull_request:
    branches: [develop, main]
  workflow_dispatch:

jobs:
  setup:
    name: Setup matrix
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}
    steps:
      - id: set-matrix
        run: |
          if [[ "${{ github.ref_name }}" == "linux" ]]; then
            echo 'matrix=[{"os":"ubuntu-latest","platform":"linux-x86_64"}]' >> "$GITHUB_OUTPUT"
          else
            echo 'matrix=[{"os":"ubuntu-latest","platform":"linux-x86_64"},{"os":"ubuntu-24.04-arm","platform":"linux-aarch64"},{"os":"macos-latest","platform":"darwin-arm64"}]' >> "$GITHUB_OUTPUT"
          fi

  test:
    name: Test (${{ matrix.platform }})
    needs: setup
    strategy:
      fail-fast: false
      matrix:
        include: ${{ fromJson(needs.setup.outputs.matrix) }}

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install dependencies (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake ninja-build nasm

      - name: Install dependencies (macOS)
        if: runner.os == 'macOS'
        run: |
          brew install cmake ninja nasm

      - name: Build deps
        run: bash scripts/build-deps.sh

      - name: Build libmodernimage
        run: bash scripts/build.sh

      - name: Run binary equivalence tests
        run: ./build/test_binary_equiv

      - name: Run thread safety tests
        run: ./build/test_thread_safety

      - name: Run fat link test
        run: ./build/test_fat_link

      - name: Generate cli-compat.json
        run: bash scripts/generate-cli-compat.sh

      - name: Package
        run: bash scripts/package.sh

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: build-${{ matrix.platform }}
          path: build/dist/
          retention-days: 7

      - name: Verify artifacts
        run: |
          echo "=== Static library ==="
          ls -lh build/libmodernimage.a
          echo "=== Shared library ==="
          ls -lh build/libmodernimage.*dylib build/libmodernimage.so 2>/dev/null || true
          echo "=== Package ==="
          ls -lh build/dist/*.tar.gz
          echo "=== cli-compat.json ==="
          cat build/cli-compat.json

      - name: Dump build logs (on failure)
        if: failure()
        run: |
          echo "=== CMake Error Log ==="
          cat build/CMakeFiles/CMakeError.log 2>/dev/null || echo "not found"
          echo "=== CMake Output Log ==="
          cat build/CMakeFiles/CMakeOutput.log 2>/dev/null || echo "not found"
